name: Formal Verification Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'swaptrade-contracts/**'
      - 'swaptrade-contracts/counter/tests/formal_verification_tests.rs'
      - '.github/workflows/formal_verification.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'swaptrade-contracts/**'
      - 'swaptrade-contracts/counter/tests/formal_verification_tests.rs'

jobs:
  formal-verification:
    name: Formal Verification Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            swaptrade-contracts/counter

      - name: Run Formal Verification Integration Suite
        run: |
          cargo test --manifest-path swaptrade-contracts/counter/Cargo.toml --test formal_verification_tests formal_verification -- --nocapture --test-threads=1
        timeout-minutes: 10

      - name: Run Exhaustive Property Tests (10,000+ sequences)
        run: |
          cargo test --manifest-path swaptrade-contracts/counter/Cargo.toml --test formal_verification_tests exhaustive_ -- --nocapture --test-threads=1
        timeout-minutes: 30

      - name: Run Witness Cases
        run: |
          cargo test --manifest-path swaptrade-contracts/counter/Cargo.toml --test formal_verification_tests witness_case -- --nocapture --test-threads=1
        timeout-minutes: 10

      - name: Run KYC State Machine Test Suite
        run: |
          cargo test --manifest-path swaptrade-contracts/counter/Cargo.toml --lib kyc_tests:: -- --nocapture --test-threads=1
        timeout-minutes: 5

      - name: Verify Release Build (no panics)
        run: |
          cargo build --manifest-path swaptrade-contracts/counter/Cargo.toml --release --verbose
        timeout-minutes: 15
